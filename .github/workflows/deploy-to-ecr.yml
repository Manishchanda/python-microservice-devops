name: Build and Push Docker Image to AWS ECR

on:
 push:
   branches:
     - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Set ENV SHORT_SHA
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c7)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
        
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-pf-aws-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push the tagged docker image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-pf-aws-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPO }}
          IMAGE_TAG: ${{env.SHORT_SHA}}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f docker/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set SHORT_SHA
      run: |
        SHORT_SHA=$(echo "${{ github.sha }}" | head -c7)
        echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
    
    - name: Render new ECS task definition (swap image)
      id: render-task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: "fargate-app-revision15.json"
        container-name: ${{ secrets.ECS_CONTAINER_NAME }}
        image: 263650262414.dkr.ecr.us-east-1.amazonaws.com/python-application:${{env.SHORT_SHA}}

    - name: Deploy ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.render-task-def.outputs.task-definition }}
        cluster: ${{ secrets.ECS_CLUSTER }}
        service: ${{ secrets.ECS_SERVICE }}
        wait-for-service-stability: true